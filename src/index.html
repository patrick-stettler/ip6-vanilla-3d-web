<!DOCTYPE html>

<html lang="de">

<head>
  <title>Vanilla 3D Web</title>
	<meta charset="utf-8">
	<meta name="description" content="">
	<meta name="keywords" content="">
	<meta name="author" content="">
	<meta name="publisher" content="">
	<meta name="robots" content="index, follow">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- -->
	<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <svg id="svg-overlay" aria-hidden="true">
    <defs>
      <!-- Repeating vertical band that scrolls upward (bottom → top), giving
           connector strokes a flowing "liquid" gradient instead of dashes. -->
      <linearGradient id="connector-gradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="150" spreadMethod="repeat">
        <stop offset="0%"   stop-color="#FFD600" stop-opacity="0.6" />
        <stop offset="50%"  stop-color="#FFFDE7" stop-opacity="1" />
        <stop offset="100%" stop-color="#FFD600" stop-opacity="0.6" />
        <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="0 -150" dur="2.5s" repeatCount="indefinite" />
      </linearGradient>
    </defs>
  </svg>
  
  <div id="legend">
    <h5>Legende</h5>
    <div class="items-container">
      <div class="item"><div class="color-box" data-status="passed"></div><p>bestanden</p></div>
      <div class="item"><div class="color-box" data-status="failed"></div><p>fehlgeschlagen</p></div>
      <div class="item"><div class="color-box" data-status="critical"></div><p>kritisch</p></div>
      <div class="item"><div class="color-box" data-status="open"></div><p>offen</p></div>
      <div class="item"><div class="color-box" data-status="ongoing"></div><p>laufend</p></div>
    </div>
  </div>

  <div id="view-selector">
    <p>Beziehungen</p>
    <input id="switch" type="checkbox">
    <label for="switch"></label>
    <p>Bewertungen</p>
  </div>

  <div id="scene"></div>

  <script type="module" src="main.js"></script>

</body>
</html>
