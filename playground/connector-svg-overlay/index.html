<!DOCTYPE html>

<html lang="de">

<head>
	<title>3D-Würfel</title>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

	<svg id="svg-overlay" aria-hidden="true">
		<defs>
			<marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
				<circle cx="3" cy="3" r="2.5" fill="#aaa" opacity="0.7"/>
			</marker>
		</defs>
		<path id="connector-path" fill="none" stroke="#fff" stroke-width="12"
			stroke-linecap="round" opacity="0.7"/>
	</svg>

	<div class="scene">
        <div class="cube cube--one">
            <div class="cube_face cube_face--front"></div>
            <div class="cube_face cube_face--back"></div>
            <div class="cube_face cube_face--right"></div>
            <div class="cube_face cube_face--left"></div>
            <div class="cube_face cube_face--top"></div>
            <div class="cube_face cube_face--bottom"></div>
        </div>
        <div class="cube cube--two">
            <div class="cube_face cube_face--front"></div>
            <div class="cube_face cube_face--back"></div>
            <div class="cube_face cube_face--right"></div>
            <div class="cube_face cube_face--left"></div>
            <div class="cube_face cube_face--top"></div>
            <div class="cube_face cube_face--bottom"></div>
        </div>
    </div>

<div id="controls">
  <label>↕ <input type="range" data-prop="rx"   min="-85"  max="85"  value="15"  step="1"></label>
  <label>↔ <input type="range" data-prop="ry"   min="-180" max="180" value="35"  step="1"></label>
  <label>⇲ <input type="range" data-prop="zoom" min="0.3"  max="3"   value="1"   step="0.05"></label>
</div>

<script>
  // controls
  document.querySelectorAll('#controls input[data-prop]').forEach(input => {
    input.addEventListener('input', () => {
      document.documentElement.style.setProperty(`--${input.dataset.prop}`, input.value);
      updateConnector();
    });
  });

  const path = document.getElementById('connector-path');
  const cube1 = document.querySelector('.cube--one');
  const cube2 = document.querySelector('.cube--two');

  function getCenterOnScreen(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  function updateConnector() {
    const a = getCenterOnScreen(cube1);
    const b = getCenterOnScreen(cube2);

    // Kubische Bézier: Kontrollpunkte horizontal versetzt für S-Kurve
    const dx = (b.x - a.x) * 0.5;
    const cp1 = { x: a.x + dx, y: a.y };
    const cp2 = { x: b.x - dx, y: b.y };

    path.setAttribute('d',
      `M ${a.x} ${a.y} C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, ${b.x} ${b.y}`
    );
  }

  window.addEventListener('resize', updateConnector);

  requestAnimationFrame(updateConnector);
</script>

</body>

</html>
